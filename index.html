<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RPM Meter</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="RPM Meter">
<meta name="theme-color" content="#0f0f0f">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f0f0f; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 16px; user-select: none;
}
h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; color: #666; text-transform: uppercase; margin-bottom: 12px; }
.tabs { display: flex; gap: 4px; width: 100%; max-width: 360px; margin-bottom: 16px; background: #1a1a1a; border-radius: 10px; padding: 4px; }
.tab { flex: 1; padding: 8px 4px; border: none; background: none; color: #555; font-size: 12px; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
.tab.active { background: #2a2a2a; color: #facc15; font-weight: 600; }
.page { display: none; width: 100%; max-width: 360px; flex-direction: column; align-items: center; }
.page.active { display: flex; }
.gauge-wrap { width: 280px; height: 168px; margin-bottom: 8px; }
canvas#gauge { display: block; }
.rpm-display { text-align: center; margin-bottom: 6px; }
.rpm-value { font-size: 56px; font-weight: 200; letter-spacing: -2px; line-height: 1; color: #facc15; }
.rpm-unit { font-size: 12px; color: #666; letter-spacing: 0.1em; margin-top: 2px; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #333; margin-right: 6px; vertical-align: middle; transition: background 0.3s; }
.status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.status-text { font-size: 12px; color: #555; vertical-align: middle; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin: 12px 0; }
.stat-card { background: #1a1a1a; border-radius: 10px; padding: 10px 6px; text-align: center; }
.stat-label { font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.stat-val { font-size: 18px; font-weight: 300; color: #ccc; }
.btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.1s; letter-spacing: 0.02em; }
.btn:active { transform: scale(0.97); }
.btn-start { background: #22c55e; color: #000; }
.btn-stop { background: #ef4444; color: #fff; }
.error-msg { font-size: 12px; color: #ef4444; margin-top: 8px; min-height: 16px; text-align: center; }
.sensitivity-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 12px; }
.sensitivity-row label { font-size: 11px; color: #555; white-space: nowrap; }
.sensitivity-row input[type=range] { flex: 1; accent-color: #facc15; }
.sensitivity-row span { font-size: 11px; color: #444; min-width: 20px; text-align: right; }
.live-graph-wrap { width: 100%; margin-top: 12px; background: #1a1a1a; border-radius: 10px; padding: 10px; }
.live-graph-label { font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
canvas#liveGraph { width: 100%; height: 80px; display: block; }
.history-empty { color: #444; font-size: 13px; text-align: center; margin-top: 40px; }
.session-card { background: #1a1a1a; border-radius: 12px; padding: 12px; margin-bottom: 10px; width: 100%; border: 1px solid #222; }
.session-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.session-date { font-size: 11px; color: #555; }
.session-note { font-size: 12px; color: #facc15; font-style: italic; margin-bottom: 6px; }
.session-stats { display: flex; gap: 12px; }
.session-stat { font-size: 11px; color: #888; }
.session-stat span { color: #ccc; font-weight: 500; }
.session-actions { display: flex; gap: 6px; margin-top: 8px; }
.btn-sm { padding: 5px 10px; border-radius: 6px; border: none; font-size: 11px; cursor: pointer; }
.btn-export { background: #1e3a2a; color: #22c55e; }
.btn-delete { background: #2a1a1a; color: #ef4444; }
canvas.session-graph { width: 100%; height: 60px; display: block; margin-top: 8px; border-radius: 6px; background: #111; }
.note-form { width: 100%; }
.note-form textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; padding: 12px; resize: none; height: 120px; font-family: inherit; margin-bottom: 8px; }
.note-form textarea:focus { outline: none; border-color: #facc15; }
.note-form textarea::placeholder { color: #444; }
.btn-save-note { background: #facc15; color: #000; }
.notes-list { width: 100%; margin-top: 16px; }
.note-card { background: #1a1a1a; border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
.note-card p { font-size: 13px; color: #ccc; line-height: 1.5; padding-right: 20px; }
.note-card .note-ts { font-size: 10px; color: #444; margin-top: 6px; }
.note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #444; font-size: 16px; cursor: pointer; }
.modal-overlay { display: none; position: fixed; inset: 0; background: #000a; z-index: 99; justify-content: center; align-items: center; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1a1a; border-radius: 14px; padding: 20px; width: 90%; max-width: 320px; }
.modal h3 { font-size: 15px; margin-bottom: 12px; color: #facc15; }
.modal textarea { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; padding: 10px; resize: none; height: 80px; font-family: inherit; margin-bottom: 10px; }
.modal textarea:focus { outline: none; border-color: #facc15; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; }
.btn-confirm { background: #facc15; color: #000; font-weight: 600; }
.btn-skip { background: #2a2a2a; color: #888; }
.offline-badge { font-size: 10px; color: #22c55e; background: #1e3a2a; padding: 3px 8px; border-radius: 20px; margin-bottom: 8px; }
</style>
</head>
<body>
<h1>RPM Meter</h1>
<div class="offline-badge" id="offlineBadge">● Online</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('meter',this)">⚡ Meter</button>
  <button class="tab" onclick="showPage('history',this)">📊 History</button>
  <button class="tab" onclick="showPage('notes',this)">📝 Notes</button>
</div>

<div class="page active" id="page-meter">
  <div class="gauge-wrap"><canvas id="gauge" width="280" height="168"></canvas></div>
  <div class="rpm-display">
    <div class="rpm-value" id="rpmVal">0</div>
    <div class="rpm-unit">RPM</div>
  </div>
  <div style="text-align:center;margin-bottom:4px;">
    <span class="status-dot" id="dot"></span>
    <span class="status-text" id="statusTxt">Tap start to measure</span>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Min</div><div class="stat-val" id="minVal">—</div></div>
    <div class="stat-card"><div class="stat-label">Avg</div><div class="stat-val" id="avgVal">—</div></div>
    <div class="stat-card"><div class="stat-label">Max</div><div class="stat-val" id="maxVal">—</div></div>
  </div>
  <button class="btn btn-start" id="mainBtn">Start</button>
  <div class="error-msg" id="errMsg"></div>
  <div class="sensitivity-row">
    <label>Sensitivity</label>
    <input type="range" id="sens" min="1" max="10" value="5" step="1">
    <span id="sensVal">5</span>
  </div>
  <div class="live-graph-wrap">
    <div class="live-graph-label">Live RPM Graph</div>
    <canvas id="liveGraph" width="340" height="80"></canvas>
  </div>
</div>

<div class="page" id="page-history">
  <div id="historyList" style="width:100%;"></div>
</div>

<div class="page" id="page-notes">
  <div class="note-form">
    <textarea id="noteInput" placeholder="Write a note about your measurement..."></textarea>
    <button class="btn btn-save-note" onclick="saveNote()">Save Note</button>
  </div>
  <div class="notes-list" id="notesList"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Session Complete</h3>
    <textarea id="modalNote" placeholder="Add a note (optional)..."></textarea>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="saveSession()">Save</button>
      <button class="btn-skip" onclick="discardSession()">Discard</button>
    </div>
  </div>
</div>

<script>
const MAX_RPM = 120000;
let running=false, audioCtx, analyser, src, stream;
let rpm=0, minRPM=Infinity, maxRPM=0, sumRPM=0, sampleCount=0;
let lastPeak=0, peakTimes=[], rafId;
let sensitivity=5, sessionLog=[], sessionStart=null, pendingSession=null;

// Storage
const load = k => { try { return JSON.parse(localStorage.getItem(k))||[]; } catch { return []; } };
const store = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e) { console.warn('Storage full',e); } };
let sessions = load('rpm_sessions');
let notes = load('rpm_notes');

// Online/offline badge
window.addEventListener('online', () => { document.getElementById('offlineBadge').textContent='● Online'; document.getElementById('offlineBadge').style.color='#22c55e'; });
window.addEventListener('offline', () => { document.getElementById('offlineBadge').textContent='● Offline'; document.getElementById('offlineBadge').style.color='#facc15'; });
if(!navigator.onLine) { document.getElementById('offlineBadge').textContent='● Offline'; document.getElementById('offlineBadge').style.color='#facc15'; }

// Gauge
const gc=document.getElementById('gauge'), gx=gc.getContext('2d');
function drawGauge(val) {
  const W=280,H=168,cx=W/2,cy=H-20,r=120;
  gx.clearRect(0,0,W,H);
  const grad=gx.createLinearGradient(cx-r,cy,cx+r,cy);
  grad.addColorStop(0,'#22c55e'); grad.addColorStop(0.5,'#eab308'); grad.addColorStop(1,'#ef4444');
  gx.beginPath(); gx.arc(cx,cy,r-8,Math.PI,0); gx.strokeStyle='#1e1e1e'; gx.lineWidth=16; gx.stroke();
  const frac=Math.min(val/MAX_RPM,1), ang=Math.PI+frac*Math.PI;
  gx.beginPath(); gx.arc(cx,cy,r-8,Math.PI,ang); gx.strokeStyle=grad; gx.lineWidth=16; gx.lineCap='round'; gx.stroke();
  for(let i=0;i<=12;i++){
    const a=Math.PI+(i/12)*Math.PI;
    gx.beginPath(); gx.moveTo(cx+Math.cos(a)*(r-26),cy+Math.sin(a)*(r-26));
    gx.lineTo(cx+Math.cos(a)*(r-30),cy+Math.sin(a)*(r-30));
    gx.strokeStyle='#333'; gx.lineWidth=1.5; gx.stroke();
  }
  const na=Math.PI+frac*Math.PI;
  gx.beginPath(); gx.moveTo(cx,cy); gx.lineTo(cx+Math.cos(na)*(r-28),cy+Math.sin(na)*(r-28));
  gx.strokeStyle='#facc15'; gx.lineWidth=2; gx.lineCap='round'; gx.stroke();
  gx.beginPath(); gx.arc(cx,cy,6,0,Math.PI*2); gx.fillStyle='#facc15'; gx.fill();
}
drawGauge(0);

// Live graph
const lgc=document.getElementById('liveGraph'), lgx=lgc.getContext('2d');
function drawLiveGraph() {
  const W=lgc.parentElement.offsetWidth-20||320, H=80;
  lgc.width=W; lgc.height=H;
  lgx.clearRect(0,0,W,H);
  const pts=sessionLog.slice(-120);
  if(pts.length<2) return;
  const maxV=Math.max(...pts.map(p=>p.rpm),1);
  lgx.beginPath();
  pts.forEach((p,i)=>{ const x=(i/(pts.length-1))*W, y=H-(p.rpm/maxV)*(H-8)-4; i===0?lgx.moveTo(x,y):lgx.lineTo(x,y); });
  lgx.strokeStyle='#facc15'; lgx.lineWidth=2; lgx.lineJoin='round'; lgx.stroke();
  lgx.lineTo(W,H); lgx.lineTo(0,H); lgx.closePath(); lgx.fillStyle='rgba(250,204,21,0.08)'; lgx.fill();
}

function drawSessionGraph(canvas, log) {
  if(!log||log.length<2) return;
  const W=canvas.parentElement.offsetWidth-24||300, H=60;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d'), maxV=Math.max(...log.map(p=>p.rpm),1);
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  log.forEach((p,i)=>{ const x=(i/(log.length-1))*W, y=H-(p.rpm/maxV)*(H-6)-3; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.strokeStyle='#facc15'; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fillStyle='rgba(250,204,21,0.08)'; ctx.fill();
}

// Detection
function detectRPM() {
  if(!analyser) return;
  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const thresh=0.05+(10-sensitivity)*0.02, now=performance.now();
  let peak=false;
  for(let i=1;i<buf.length-1;i++){ if(buf[i]>thresh&&buf[i]>buf[i-1]&&buf[i]>buf[i+1]){peak=true;break;} }
  if(peak&&now-lastPeak>50){
    peakTimes.push(now); lastPeak=now;
    peakTimes=peakTimes.filter(t=>now-t<2000);
    if(peakTimes.length>=2){
      const ivs=[]; for(let i=1;i<peakTimes.length;i++) ivs.push(peakTimes[i]-peakTimes[i-1]);
      rpm=Math.min(Math.round(60000/(ivs.reduce((a,b)=>a+b,0)/ivs.length)),MAX_RPM);
    }
  }
  if(now-lastPeak>2000) rpm=Math.max(0,rpm-30);
  document.getElementById('rpmVal').textContent=rpm;
  drawGauge(rpm);
  if(rpm>0){
    sampleCount++; sumRPM+=rpm;
    if(rpm<minRPM) minRPM=rpm;
    if(rpm>maxRPM) maxRPM=rpm;
    document.getElementById('minVal').textContent=minRPM;
    document.getElementById('avgVal').textContent=Math.round(sumRPM/sampleCount);
    document.getElementById('maxVal').textContent=maxRPM;
    sessionLog.push({t:Date.now(),rpm});
    drawLiveGraph();
  }
  rafId=requestAnimationFrame(detectRPM);
}

async function startMeasuring() {
  document.getElementById('errMsg').textContent='';
  try {
    stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=2048;
    src=audioCtx.createMediaStreamSource(stream); src.connect(analyser);
    running=true; sessionStart=new Date(); sessionLog=[];
    minRPM=Infinity; maxRPM=0; sumRPM=0; sampleCount=0; peakTimes=[]; lastPeak=0; rpm=0;
    document.getElementById('dot').classList.add('active');
    document.getElementById('statusTxt').textContent='Listening…';
    document.getElementById('mainBtn').textContent='Stop';
    document.getElementById('mainBtn').className='btn btn-stop';
    ['minVal','avgVal','maxVal'].forEach(id=>document.getElementById(id).textContent='—');
    detectRPM();
  } catch(e) { document.getElementById('errMsg').textContent='Microphone access denied. Please allow and retry.'; }
}

function stopMeasuring() {
  running=false; cancelAnimationFrame(rafId);
  if(src) src.disconnect();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  audioCtx=src=analyser=stream=null;
  document.getElementById('dot').classList.remove('active');
  document.getElementById('statusTxt').textContent='Stopped';
  document.getElementById('mainBtn').textContent='Start';
  document.getElementById('mainBtn').className='btn btn-start';
  if(sessionLog.length>0) openModal();
}

document.getElementById('mainBtn').onclick=()=>running?stopMeasuring():startMeasuring();
document.getElementById('sens').oninput=e=>{sensitivity=+e.target.value;document.getElementById('sensVal').textContent=sensitivity;};

// Modal
function openModal() {
  pendingSession={start:sessionStart,end:new Date(),log:sessionLog.slice(),min:minRPM===Infinity?0:minRPM,max:maxRPM,avg:sampleCount?Math.round(sumRPM/sampleCount):0};
  document.getElementById('modalNote').value='';
  document.getElementById('modal').classList.add('open');
}
function saveSession() {
  pendingSession.note=document.getElementById('modalNote').value.trim();
  sessions.unshift(pendingSession); store('rpm_sessions',sessions);
  document.getElementById('modal').classList.remove('open');
  renderHistory();
}
function discardSession() { document.getElementById('modal').classList.remove('open'); }

// Pages
function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='history') renderHistory();
  if(p==='notes') renderNotes();
}

// History
function renderHistory() {
  const el=document.getElementById('historyList');
  if(!sessions.length){el.innerHTML='<p class="history-empty">No sessions yet.<br>Start measuring to record data.</p>';return;}
  el.innerHTML=sessions.map((s,i)=>{
    const d=new Date(s.start), dur=Math.round((new Date(s.end)-new Date(s.start))/1000);
    return `<div class="session-card">
      <div class="session-header">
        <div class="session-date">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</div>
        <div class="session-date">${dur}s</div>
      </div>
      ${s.note?`<div class="session-note">"${s.note}"</div>`:''}
      <div class="session-stats">
        <div class="session-stat">Min <span>${s.min}</span></div>
        <div class="session-stat">Avg <span>${s.avg}</span></div>
        <div class="session-stat">Max <span>${s.max}</span></div>
      </div>
      <canvas class="session-graph" id="sg${i}"></canvas>
      <div class="session-actions">
        <button class="btn-sm btn-export" onclick="exportCSV(${i})">Export CSV</button>
        <button class="btn-sm btn-delete" onclick="deleteSession(${i})">Delete</button>
      </div>
    </div>`;
  }).join('');
  sessions.forEach((_,i)=>{ const c=document.getElementById('sg'+i); if(c) setTimeout(()=>drawSessionGraph(c,sessions[i].log),50); });
}

function deleteSession(i) { sessions.splice(i,1); store('rpm_sessions',sessions); renderHistory(); }

function exportCSV(i) {
  const s=sessions[i], start=new Date(s.start).getTime();
  let csv='Time(s),RPM\n';
  (s.log||[]).forEach(p=>{ csv+=`${((p.t-start)/1000).toFixed(1)},${p.rpm}\n`; });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`rpm-session-${i+1}.csv`; a.click();
}

// Notes
function saveNote() {
  const txt=document.getElementById('noteInput').value.trim();
  if(!txt) return;
  notes.unshift({text:txt,ts:new Date().toLocaleString()});
  store('rpm_notes',notes);
  document.getElementById('noteInput').value='';
  renderNotes();
}
function deleteNote(i) { notes.splice(i,1); store('rpm_notes',notes); renderNotes(); }
function renderNotes() {
  const el=document.getElementById('notesList');
  if(!notes.length){el.innerHTML='<p class="history-empty">No notes yet.</p>';return;}
  el.innerHTML=notes.map((n,i)=>`
    <div class="note-card">
      <button class="note-del" onclick="deleteNote(${i})">×</button>
      <p>${n.text.replace(/\n/g,'<br>')}</p>
      <div class="note-ts">${n.ts}</div>
    </div>`).join('');
}

// Register inline service worker for persistent offline
if('serviceWorker' in navigator) {
  const sw = `
const CACHE='rpm-v7';
self.addEventListener('install',e=>{
  e.waitUntil(
    fetch(self.location.origin+self.location.pathname.replace('sw-inline.js','')).then(r=>
      caches.open(CACHE).then(c=>c.put('/',r))
    ).catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
    return res;
  }).catch(()=>caches.match('/'))));
});`;
  const blob = new Blob([sw],{type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'/'})
    .then(()=>console.log('SW registered'))
    .catch(e=>{
      // Fallback: try registering sw.js if blob fails
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
}

renderNotes();
</script>
</body>
</html>
