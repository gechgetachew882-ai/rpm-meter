<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RPM Meter</title>

<!-- PWA / Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="RPM Meter">
<meta name="theme-color" content="#0f0f0f">

<!-- App Icon (inline SVG tachometer as favicon + apple-touch-icon) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f0f0f'/%3E%3Cpath d='M50 75 A30 30 0 1 1 50 15 A30 30 0 1 1 50 75' fill='none' stroke='%23facc15' stroke-width='8' stroke-dasharray='75 25' stroke-dashoffset='12'/%3E%3Cline x1='50' y1='72' x2='68' y2='38' stroke='%23facc15' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='72' r='5' fill='%23facc15'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f0f0f'/%3E%3Cpath d='M50 75 A30 30 0 1 1 50 15 A30 30 0 1 1 50 75' fill='none' stroke='%23facc15' stroke-width='8' stroke-dasharray='75 25' stroke-dashoffset='12'/%3E%3Cline x1='50' y1='72' x2='68' y2='38' stroke='%23facc15' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='72' r='5' fill='%23facc15'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    user-select: none;
  }
  h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; color: #666; text-transform: uppercase; margin-bottom: 28px; }
  .gauge-wrap { position: relative; width: 280px; height: 168px; margin-bottom: 8px; }
  canvas#gauge { display: block; }
  .rpm-display { text-align: center; margin-bottom: 6px; }
  .rpm-value { font-size: 56px; font-weight: 200; letter-spacing: -2px; line-height: 1; color: #facc15; }
  .rpm-unit { font-size: 12px; color: #666; letter-spacing: 0.1em; margin-top: 2px; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #333;
    margin-right: 6px; vertical-align: middle; transition: background 0.3s;
  }
  .status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .status-text { font-size: 12px; color: #555; vertical-align: middle; }
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; width: 100%; max-width: 320px; margin: 20px 0 24px;
  }
  .stat-card { background: #1a1a1a; border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat-label { font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 300; color: #ccc; }
  .btn {
    width: 100%; max-width: 320px; padding: 16px;
    border-radius: 12px; border: none; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: transform 0.1s, background 0.2s; letter-spacing: 0.02em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start { background: #22c55e; color: #000; }
  .btn-stop  { background: #ef4444; color: #fff; }
  .error-msg { font-size: 12px; color: #ef4444; margin-top: 12px; text-align: center; min-height: 16px; }
  .sensitivity-row {
    display: flex; align-items: center; gap: 10px;
    width: 100%; max-width: 320px; margin-top: 16px;
  }
  .sensitivity-row label { font-size: 11px; color: #555; white-space: nowrap; }
  .sensitivity-row input[type=range] { flex: 1; accent-color: #22c55e; }
  .sensitivity-row span { font-size: 11px; color: #444; min-width: 20px; text-align: right; }
</style>
</head>
<body>
<h1>RPM Meter</h1>

<div class="gauge-wrap">
  <canvas id="gauge" width="280" height="168"></canvas>
</div>

<div class="rpm-display">
  <div class="rpm-value" id="rpmVal">0</div>
  <div class="rpm-unit">RPM</div>
</div>

<div style="text-align:center;margin-bottom:4px;">
  <span class="status-dot" id="dot"></span>
  <span class="status-text" id="statusTxt">Tap start to measure</span>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-label">Min</div><div class="stat-val" id="minVal">—</div></div>
  <div class="stat-card"><div class="stat-label">Avg</div><div class="stat-val" id="avgVal">—</div></div>
  <div class="stat-card"><div class="stat-label">Max</div><div class="stat-val" id="maxVal">—</div></div>
</div>

<button class="btn btn-start" id="mainBtn">Start</button>
<div class="error-msg" id="errMsg"></div>

<div class="sensitivity-row">
  <label>Sensitivity</label>
  <input type="range" id="sens" min="1" max="10" value="5" step="1">
  <span id="sensVal">5</span>
</div>

<script>
const canvas = document.getElementById('gauge');
const ctx = canvas.getContext('2d');
const rpmEl = document.getElementById('rpmVal');
const dot = document.getElementById('dot');
const statusTxt = document.getElementById('statusTxt');
const minEl = document.getElementById('minVal');
const avgEl = document.getElementById('avgVal');
const maxEl = document.getElementById('maxVal');
const btn = document.getElementById('mainBtn');
const errMsg = document.getElementById('errMsg');
const sensSlider = document.getElementById('sens');
const sensVal = document.getElementById('sensVal');

const MAX_RPM = 120000;
let running = false, audioCtx = null, analyser = null, src = null, stream = null;
let rpm = 0, minRPM = Infinity, maxRPM = 0, sumRPM = 0, sampleCount = 0;
let lastPeak = 0, peakTimes = [], rafId = null;
let sensitivity = 5;

sensSlider.oninput = () => { sensitivity = +sensSlider.value; sensVal.textContent = sensitivity; };

function drawGauge(val) {
  const W = 280, H = 168, cx = W/2, cy = H - 20, r = 120;
  ctx.clearRect(0, 0, W, H);
  const startA = Math.PI, endA = 0;

  const grad = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
  grad.addColorStop(0, '#22c55e');
  grad.addColorStop(0.5, '#eab308');
  grad.addColorStop(1, '#ef4444');

  ctx.beginPath();
  ctx.arc(cx, cy, r - 8, startA, endA);
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 16;
  ctx.stroke();

  const fraction = Math.min(val / MAX_RPM, 1);
  const angle = Math.PI + fraction * Math.PI;
  ctx.beginPath();
  ctx.arc(cx, cy, r - 8, startA, angle);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 16;
  ctx.lineCap = 'round';
  ctx.stroke();

  for (let i = 0; i <= 12; i++) {
    const a = Math.PI + (i / 12) * Math.PI;
    const inner = r - 26, outer = r - 30;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    ctx.lineTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  const na = Math.PI + fraction * Math.PI;
  const nl = r - 28;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(na) * nl, cy + Math.sin(na) * nl);
  ctx.strokeStyle = '#facc15';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#facc15';
  ctx.fill();
}

drawGauge(0);

function detectRPM() {
  if (!analyser) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  const thresh = 0.05 + (10 - sensitivity) * 0.02;
  const now = performance.now();
  let peak = false;
  for (let i = 1; i < buf.length - 1; i++) {
    if (buf[i] > thresh && buf[i] > buf[i-1] && buf[i] > buf[i+1]) { peak = true; break; }
  }

  if (peak && now - lastPeak > 50) {
    peakTimes.push(now);
    lastPeak = now;
    peakTimes = peakTimes.filter(t => now - t < 2000);
    if (peakTimes.length >= 2) {
      const intervals = [];
      for (let i = 1; i < peakTimes.length; i++) intervals.push(peakTimes[i] - peakTimes[i-1]);
      const avg = intervals.reduce((a,b) => a+b,0) / intervals.length;
      rpm = Math.round(60000 / avg);
      if (rpm > MAX_RPM) rpm = MAX_RPM;
    }
  }

  if (now - lastPeak > 2000) { rpm = Math.max(0, rpm - 30); }

  rpmEl.textContent = rpm;
  drawGauge(rpm);

  if (rpm > 0) {
    sampleCount++;
    sumRPM += rpm;
    if (rpm < minRPM) minRPM = rpm;
    if (rpm > maxRPM) maxRPM = rpm;
    minEl.textContent = minRPM;
    avgEl.textContent = Math.round(sumRPM / sampleCount);
    maxEl.textContent = maxRPM;
  }

  rafId = requestAnimationFrame(detectRPM);
}

async function startMeasuring() {
  errMsg.textContent = '';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);

    running = true;
    dot.classList.add('active');
    statusTxt.textContent = 'Listening…';
    btn.textContent = 'Stop';
    btn.className = 'btn btn-stop';
    minRPM = Infinity; maxRPM = 0; sumRPM = 0; sampleCount = 0;
    minEl.textContent = avgEl.textContent = maxEl.textContent = '—';
    peakTimes = []; lastPeak = 0; rpm = 0;
    detectRPM();
  } catch(e) {
    errMsg.textContent = 'Microphone access denied. Please allow and retry.';
  }
}

function stopMeasuring() {
  running = false;
  cancelAnimationFrame(rafId);
  if (src) src.disconnect();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = src = analyser = stream = null;
  dot.classList.remove('active');
  statusTxt.textContent = 'Stopped';
  btn.textContent = 'Start';
  btn.className = 'btn btn-start';
}

btn.onclick = () => running ? stopMeasuring() : startMeasuring();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
